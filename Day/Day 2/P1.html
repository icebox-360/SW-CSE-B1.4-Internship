<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-widt, initial-scale=1.0">
    <title>Document</title>
    <style>
        .responsive-image{
            max-width: 100%;
            height: auto;
            display: block;
        } 
    </style>
</head>
<body>
    <!--src: source alt: alternative text | self - closing tag -->
    <img src="i 1.jpg"alt="could not find the image">
    <img src="images/i2.jpg"alt="could not find the image">
    <!--common attributes & variations -->
    <!-- width and height -->
    <img src="i 1.jpg"alt="could not find the image"width="400" height="100">
    <!--tooltips -->
    <img src="i 1.jpg"alt="could not find the image"title="image of a dog">
    <!-- style -->
    <img src="i 1.jpg"alt="could not find the image"style="width: 400px; height: 100px; border-radius: 10%;border: 2px solid red;">
    <!-- image formats -->
     <!-- 1.jpg 2.PNG 3.GIF 4.SVG 5.WEBP -->
      <!-- Responsive images via css -->
       <img src="i 1.jpg"alt="could not find the image" class="responsive-image">
</body>
</html>
