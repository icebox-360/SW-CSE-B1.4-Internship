<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-class selectors</title>
    <style>
        a:hover{
            color: green;
            background-color: yellow;
            text-decoration: underline;
        }
        input:focus{
            outline: 4px solid red;
        }
    </style>
</head>
<body>
  <p>Pseudo-class selectors : select elements in a certain state (hover, focus, first child)</p>
  <h1>heading1</h1>
  <a href="https://www.google.com">take me to google.com</a><br><br>      
  <input type="text" name="" id="">
</body>
</html>
