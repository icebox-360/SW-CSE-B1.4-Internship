<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a[href^="https"]{
            color: red;
            background-color: yellow;
        }
        input[type="text"]{
            border: 2px solid red;
        }
    </style>
</head>
<body>
  <p>attribute selector : select based on html attributes and their values</p>
  <h1>heading1</h1>
  <a href="https://www.google.com">take me to google.com</a><br><br>      
  <input type="text" name="" id="">
</body>
</html>
