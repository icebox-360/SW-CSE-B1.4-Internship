<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>child selector</title>
    <style>
        ul > li {
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <p> Targets elements that are direct children (one level down )</p>
        <h1>heading1</h1>
        <ul>
            <li>laptop</li>
            <li>mobile</li>
            <li>tablet</li>
        </ul>
</body>
</html>
